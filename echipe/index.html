<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Teams #6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG5193qgq-dNX41yhCgXrl9WFNLhUiNnU",
            authDomain: "turneu-cruce.firebaseapp.com",
            projectId: "turneu-cruce",
            storageBucket: "turneu-cruce.firebasestorage.app",
            messagingSenderId: "169022341825",
            appId: "1:169022341825:web:53678e9ce275654bfe4a40"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SEZON_ID = "JOKER_TEAM_6";
        const ADMINS = ["isshmen@gmail.com", "admin@admin.ro"];
        let userLogat = null, currentSezonData = null;
        let state = { pagina: "home", idGrupa: null, faza: "f1", search: "" };

        const isAdmin = () => userLogat && ADMINS.includes(userLogat.email);

        window.loginAdmin = async () => {
            const email = prompt("Email:", "admin@admin.ro"), pass = prompt("Parolă:");
            if (email && pass) { try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Eroare!"); } }
        };

        window.logout = () => signOut(auth);
        window.nav = (p, g = null, f = "f1") => { state = { ...state, pagina: p, idGrupa: g, faza: f }; render(); };
        window.handleSearch = (val) => { state.search = val.toLowerCase(); render(); };

        // Funcția nouă pentru a adăuga echipa fără RESET
        window.addTeamToGroup2 = async () => {
            if (!isAdmin() || !currentSezonData) return;
            const nouaEchipa = "Ildi Ildi si Paula Novac";
            let data = { ...currentSezonData };
            
            if (data.f1["2"].participanti.includes(nouaEchipa)) {
                alert("Echipa este deja în Grupa 2!");
                return;
            }

            // 1. Adăugăm echipa în listă
            const vechiiParticipanti = [...data.f1["2"].participanti];
            data.f1["2"].participanti.push(nouaEchipa);

            // 2. Generăm doar meciurile noi (Noua echipă vs toți ceilalți)
            vechiiParticipanti.forEach((p, index) => {
                data.f1["2"].meciuri.push({
                    id: `m6_2_new_${Date.now()}_${index}`,
                    p1: p,
                    p2: nouaEchipa,
                    s1t: 0, s2t: 0, s1r: 0, s2r: 0,
                    gata: false
                });
            });

            await setDoc(doc(db, "sezoane", SEZON_ID), data);
            alert("Echipa Ildi & Paula a fost adăugată în Grupa 2!");
        };

        window.initSezon6Echipe = async () => {
            if (!isAdmin()) return;
            const structura = {
                "1": ["Vali Dragomir si Ancuta Sacota", "Ghiata Nicoleta si Livia Holdis", "Roxana Valentina si Vass Robert", "Ionut Raul si Vasy Ignat"],
                "2": ["Andrey Mato si Ioana Cioanca", "Andreea Tontea si Ionel Muntean", "Cami Alessia si Vlad Tino", "Coman Iuliu si Brighitta Divine"],
                "3": ["Gerard Miodrag si Jacson Jacson", "Bobby Tiberiu si Mihai Lungu", "Dan Marius si Adina Lavinia", "Carina Florina si Iosif Ghimboasa"],
                "4": ["Florica Lile si Ady Cap", "Foghis Elena si Paunita Bran", "Ovidiu Miclaus si Julia Kornidesz", "Andreea Deea si Galbenusa Aurelia"]
            };
            let f1 = {};
            Object.keys(structura).forEach(gk => {
                const p = structura[gk];
                let meciuri = [];
                for (let i = 0; i < p.length; i++) {
                    for (let j = i + 1; j < p.length; j++) {
                        meciuri.push({ id: `m6_${gk}_${i}${j}`, p1: p[i], p2: p[j], s1t: 0, s2t: 0, s1r: 0, s2r: 0, gata: false });
                    }
                }
                f1[gk] = { participanti: p, meciuri: meciuri };
            });
            await setDoc(doc(db, "sezoane", SEZON_ID), { f1, status: 'activ' });
            alert("Turneul pe Echipe #6 a fost inițializat!");
        };

        const calculeazaClasament = (g) => {
            if (!g) return [];
            let st = {}; g.participanti.forEach(p => st[p] = { v: 0, c: 0, p: 0, nume: p });
            g.meciuri.forEach(m => {
                if (!m.gata) return;
                [{ s1: m.s1t, s2: m.s2t }, { s1: m.s1r, s2: m.s2r }].forEach(s => {
                    if (s.s1 > s.s2) st[m.p1].v++; else if (s.s2 > s.s1) st[m.p2].v++;
                    st[m.p1].c += s.s1; st[m.p1].p += s.s2; st[m.p2].c += s.s2; st[m.p2].p += s.s1;
                });
            });
            return Object.values(st).sort((a, b) => b.v - a.v || b.c - a.c || a.p - b.p);
        };

        window.updateScor = async (mId, set, p1, p2, ref) => {
            if (!isAdmin()) return;
            const val = prompt("Scor (ex: 3-2):");
            if (!val) return;
            const [v1, v2] = val.split("-").map(Number);
            let data = { ...currentSezonData };
            let meci = data[state.faza][state.idGrupa].meciuri.find(m => m.id === mId);
            if (ref === p1) { meci[`s1${set}`] = v1; meci[`s2${set}`] = v2; }
            else { meci[`s1${set}`] = v2; meci[`s2${set}`] = v1; }
            meci.gata = true;
            await setDoc(doc(db, "sezoane", SEZON_ID), data);
        };

        async function render() {
            const root = document.getElementById('app');
            let html = `<div class="max-w-3xl mx-auto p-4 text-white min-h-screen">
                <nav class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
                    <h1 onclick="nav('home')" class="font-black text-2xl cursor-pointer italic uppercase">Best Teams <span class="text-blue-500">#6</span></h1>
                    <div class="flex gap-2 items-center">
                        ${isAdmin() ? `<button onclick="addTeamToGroup2()" class="text-[8px] bg-blue-600 px-2 py-1 rounded uppercase font-bold">Add Team G2</button>` : ''}
                        ${isAdmin() && !currentSezonData ? `<button onclick="initSezon6Echipe()" class="text-[8px] bg-red-600 px-2 py-1 rounded uppercase font-bold tracking-tighter">Start Sezon 6</button>` : ''}
                        ${userLogat ? `<button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase">Logout</button>` : `<button onclick="loginAdmin()" class="text-[10px] text-slate-500 font-bold uppercase">Admin</button>`}
                    </div>
                </nav>`;

            if (state.pagina === "home") {
                html += `<div class="mb-8"><input type="text" oninput="handleSearch(this.value)" placeholder="Caută echipă..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-blue-500 transition-all shadow-inner" value="${state.search}"></div>`;

                if (currentSezonData?.f1) {
                    html += `<h2 class="text-xs font-black uppercase text-slate-600 mb-6 tracking-[0.3em] text-center">Faza Grupelor</h2>
                             <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">`;
                    Object.keys(currentSezonData.f1).sort().forEach(gk => {
                        const grupaData = currentSezonData.f1[gk];
                        const clasament = calculeazaClasament(grupaData);
                        const matchSearch = grupaData.participanti.some(p => p.toLowerCase().includes(state.search));
                        
                        if (state.search === "" || matchSearch) {
                            html += `<div onclick="nav('grupa', '${gk}')" class="bg-slate-900/80 p-8 rounded-[2.5rem] border border-white/5 cursor-pointer hover:border-blue-500/50 transition-all shadow-2xl group">
                                <div class="flex justify-between items-center mb-6">
                                    <div class="text-4xl font-black italic group-hover:text-blue-500 transition-colors">Grupa ${gk}</div>
                                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Detalii →</span>
                                </div>
                                <div class="space-y-3">
                                    ${clasament.map((p, idx) => `
                                        <div class="p-3 rounded-2xl ${idx < 2 ? 'bg-green-500/10 border border-green-500/20 text-green-400' : 'bg-black/20 border border-transparent text-slate-400'} text-[11px] font-black uppercase italic truncate">
                                            ${p.nume}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>`;
                        }
                    });
                    html += `</div>`;
                }
            } else if (state.pagina === "grupa") {
                const g = currentSezonData[state.faza][state.idGrupa], c = calculeazaClasament(g);
                html += `<button onclick="nav('home')" class="mb-6 text-[10px] font-black uppercase text-blue-500 tracking-widest">← Înapoi la index</button>
                         <h2 class="text-4xl font-black mb-10 text-center italic uppercase text-blue-500">Grupa ${state.idGrupa}</h2>
                         <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 mb-10 overflow-hidden shadow-2xl">
                            <table class="w-full text-xs font-bold">
                                <tr class="text-slate-500 uppercase text-[9px] tracking-widest"><th class="text-left pb-4 px-2">Echipă</th><th class="text-center pb-4">V</th><th class="text-center pb-4">P+</th><th class="text-right pb-4 px-2">P-</th></tr>
                                ${c.map((x, i) => `<tr class="border-t border-white/5 ${i < 2 ? 'bg-green-500/5' : ''}">
                                    <td class="py-5 uppercase italic ${i < 2 ? 'text-green-400' : 'text-blue-400'} px-2">${x.nume}</td>
                                    <td class="text-center text-white font-black">${x.v}</td><td class="text-center">${x.c}</td><td class="text-right text-slate-500 px-2">${x.p}</td>
                                </tr>`).join('')}
                            </table>
                         </div>`;
                
                g.participanti.forEach(j => {
                    html += `<div class="mb-10"><div class="text-sm font-black uppercase mb-5 text-white border-l-4 border-blue-500 pl-4 bg-slate-900/50 py-3 rounded-r-xl shadow-lg">${j}</div>`;
                    g.meciuri.filter(m => m.p1 === j || m.p2 === j).forEach(m => {
                        const adv = m.p1 === j ? m.p2 : m.p1, sT = m.p1 === j ? `${m.s1t}-${m.s2t}` : `${m.s2t}-${m.s1t}`, sR = m.p1 === j ? `${m.s1r}-${m.s2r}` : `${m.s2r}-${m.s1r}`;
                        html += `<div class="bg-slate-900/40 p-5 rounded-2xl border border-white/5 flex justify-between items-center mb-3 hover:bg-slate-900/60 transition-colors">
                            <div class="text-[10px] font-bold uppercase italic text-blue-400 w-1/2">vs ${adv}</div>
                            <div class="flex gap-2">
                                <button onclick="updateScor('${m.id}','t','${m.p1}','${m.p2}','${j}')" class="bg-black/60 border border-slate-800 px-4 py-2 rounded-xl text-[10px] font-black hover:border-blue-500 transition-all">T: ${sT}</button>
                                <button onclick="updateScor('${m.id}','r','${m.p1}','${m.p2}','${j}')" class="bg-black/60 border border-slate-800 px-4 py-2 rounded-xl text-[10px] font-black hover:border-blue-500 transition-all">R: ${sR}</button>
                            </div>
                        </div>`;
                    });
                    html += `</div>`;
                });
            }
            html += `<footer class="mt-20 border-t border-slate-900 pt-10 text-center pb-12"><a href="https://www.facebook.com/isshmenn" target="_blank" class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-700 hover:text-blue-500 transition-colors">© 2026. Creat de Vali Dragomir</a></footer>`;
            root.innerHTML = html + `</div>`;
        }

        onAuthStateChanged(auth, u => { userLogat = u; render(); });
        onSnapshot(doc(db, "sezoane", SEZON_ID), s => { if (s.exists()) { currentSezonData = s.data(); render(); } });
    </script>
</head>
<body class="bg-black font-sans tracking-tight selection:bg-blue-500/30"><div id="app"></div></body>
</html>
