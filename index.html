<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joker #4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG5193qgq-dNX41yhCgXrl9WFNLhUiNnU",
            authDomain: "turneu-cruce.firebaseapp.com",
            projectId: "turneu-cruce",
            storageBucket: "turneu-cruce.firebasestorage.app",
            messagingSenderId: "169022341825",
            appId: "1:169022341825:web:53678e9ce275654bfe4a40"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SEZON_ID = "JOKER_4";
        const ADMINS = ["isshmen@gmail.com", "admin@admin.ro"];
        let userLogat = null, currentSezonData = null, dateJucatori = {};
        let state = { pagina: "home", idGrupa: null, faza: "f1", search: "" };

        const isAdmin = () => userLogat && ADMINS.includes(userLogat.email);

        window.loginAdmin = async () => {
            const email = prompt("Email:", "admin@admin.ro"), pass = prompt("Parola:");
            if (email && pass) { try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Eroare!"); } }
        };

        window.logout = () => signOut(auth);
        window.nav = (p, f="f1", g=null) => { state = { ...state, pagina:p, faza:f, idGrupa:g }; render(); };
        window.handleSearch = (val) => { state.search = val.toLowerCase(); render(); };

        const drawUser = (nume, imgSize = "w-6 h-6", textSize = "text-[11px]") => {
            const userData = dateJucatori[nume], hasFoto = userData && userData.poza;
            return `<div class="flex items-center gap-2">
                ${hasFoto ? `<img src="${userData.poza}" class="${imgSize} rounded-full object-cover border border-white/10 shadow-sm">` : `<div class="${imgSize} rounded-full bg-slate-800 border border-white/5 flex items-center justify-center text-[8px] font-bold text-slate-500 uppercase">${nume.charAt(0)}</div>`}
                <span class="${textSize} uppercase italic font-medium truncate">${nume}</span>
            </div>`;
        };

        const calculeazaClasament = (g) => {
            if(!g) return [];
            let st = {}; g.participanti.forEach(p => st[p] = { v: 0, c: 0, p: 0, nume: p });
            g.meciuri.forEach(m => {
                if(!m.gata) return;
                [{s1:m.s1t, s2:m.s2t}, {s1:m.s1r, s2:m.s2r}].forEach(s => {
                    if(s.s1 > s.s2) st[m.p1].v++; else if(s.s2 > s.s1) st[m.p2].v++;
                    st[m.p1].c += s.s1; st[m.p1].p += s.s2; st[m.p2].c += s.s2; st[m.p2].p += s.s1;
                });
            });
            return Object.values(st).sort((a,b) => b.v - a.v || b.c - a.c || a.p - b.p);
        };

        window.initSezon4 = async () => {
            if (!isAdmin()) return;
            const structura = {
                "A": ["Cami Alessia", "Catrinet Ionuț", "Ion Radan", "Mihai Lungu"],
                "B": ["Ancuța Ilieș", "Dan Marius", "Iosif Ghimboasa", "Roxana Nani"],
                "C": ["Ionel Muntean", "Bobby Tiberiu", "Ghiață Nicoleta", "Mariana Balaj"],
                "D": ["Adi Ignat", "Coman Iuliu Daniel", "Ionuț Raul", "Siegfried Schuster"],
                "E": ["Florian Lille", "Andrey Mato", "Ioana Cristina", "Michael Topan"],
                "F": ["Vlad Gavrilaș", "Cristian Pătruț", "Jacson Jacson", "Ovi Miclăuș"],
                "G": ["Adrian Murgu", "Carina Florina Luca", "Ioana Cioanca", "Livia Holdiș"],
                "H": ["Gerard Miodrag", "Jozsef Zsolt", "Mariana Mois", "Vlad Tino"]
            };
            let f1 = {};
            Object.keys(structura).forEach(L => {
                const part = structura[L];
                let meciuri = [];
                for(let i=0; i<part.length; i++) {
                    for(let j=i+1; j<part.length; j++) {
                        meciuri.push({ id: `m4_${L}_${i}${j}`, p1: part[i], p2: part[j], s1t: 0, s2t: 0, s1r: 0, s2r: 0, gata: false });
                    }
                }
                f1[L] = { participanti: part, meciuri: meciuri };
            });
            await setDoc(doc(db, "sezoane", SEZON_ID), { f1, status: 'activ' });
            alert("Sezonul 4 inițializat!");
        };

        window.genereazaPreliminarii = async () => {
            if (!isAdmin() || !currentSezonData?.f1) return;
            const f1 = currentSezonData.f1;
            const getLoc = (gId, loc) => calculeazaClasament(f1[gId])[loc - 1]?.nume;

            const structuraF2 = {
                "1": [getLoc("A", 1), getLoc("B", 2), getLoc("C", 1), getLoc("D", 2)],
                "2": [getLoc("A", 2), getLoc("B", 1), getLoc("C", 2), getLoc("D", 1)],
                "3": [getLoc("E", 1), getLoc("F", 2), getLoc("G", 1), getLoc("H", 2)],
                "4": [getLoc("E", 2), getLoc("F", 1), getLoc("G", 2), getLoc("H", 1)]
            };

            let f2 = {};
            Object.keys(structuraF2).forEach(gk => {
                const part = structuraF2[gk].filter(p => p !== undefined);
                let meciuri = [];
                for(let i=0; i<part.length; i++) {
                    for(let j=i+1; j<part.length; j++) {
                        meciuri.push({ id: `m4_f2_${gk}_${i}${j}`, p1: part[i], p2: part[j], s1t: 0, s2t: 0, s1r: 0, s2r: 0, gata: false });
                    }
                }
                f2[gk] = { participanti: part, meciuri: meciuri };
            });

            await updateDoc(doc(db, "sezoane", SEZON_ID), { f2 });
            alert("Preliminariile au fost generate!");
        };

        window.updateScorMeci = async (mId, set, p1, p2, tit) => {
            if(!isAdmin()) return;
            const val = prompt(`Scor (ex: 3-2):`);
            if(!val) return;
            let [v1, v2] = val.split("-").map(Number);
            let data = {...currentSezonData}, meci = data[state.faza][state.idGrupa].meciuri.find(m => m.id === mId);
            if (tit === p1) { meci[`s1${set}`] = v1; meci[`s2${set}`] = v2; }
            else { meci[`s1${set}`] = v2; meci[`s2${set}`] = v1; }
            meci.gata = true;
            await setDoc(doc(db, "sezoane", SEZON_ID), data);
        };

        async function render() {
            const root = document.getElementById('app');
            let html = `<div class="max-w-2xl mx-auto p-4 text-white min-h-[85vh]">
                <nav class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
                    <h1 onclick="nav('home')" class="text-2xl font-black italic uppercase cursor-pointer">Joker <span class="text-blue-500">#4</span></h1>
                    <div class="flex gap-4">
                        ${isAdmin() && !currentSezonData ? `<button onclick="initSezon4()" class="text-[9px] bg-red-600 px-2 py-1 rounded font-bold uppercase">Start Sezon 4</button>` : ''}
                        ${isAdmin() && currentSezonData?.f1 && !currentSezonData?.f2 ? `<button onclick="genereazaPreliminarii()" class="text-[9px] bg-blue-600 px-2 py-1 rounded font-bold uppercase italic tracking-tighter">Generează Preliminarii</button>` : ''}
                        ${userLogat ? `<button onclick="logout()" class="text-[10px] text-red-500 font-bold uppercase">Ieșire</button>` : `<button onclick="loginAdmin()" class="text-[10px] text-slate-500 font-bold uppercase">Admin</button>`}
                    </div>
                </nav>`;

            if(state.pagina === "home") {
                html += `<div class="mb-6"><input type="text" placeholder="Caută jucător..." value="${state.search}" oninput="handleSearch(this.value)" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm focus:border-blue-500 outline-none text-white font-bold"></div>`;
                
                // FAZA 1 - GRUPELE A-H
                if(currentSezonData?.f1) {
                    html += `<h2 class="text-xl font-black italic uppercase mb-4 text-slate-500">Faza Grupelor</h2>
                             <div class="grid grid-cols-4 gap-2 mb-10">`;
                    Object.keys(currentSezonData.f1).sort().forEach(gk => {
                        const inSearch = currentSezonData.f1[gk].participanti.some(p => p.toLowerCase().includes(state.search));
                        if(state.search === "" || inSearch) {
                            html += `<div onclick="nav('grupa', 'f1', '${gk}')" class="bg-slate-900/40 p-4 rounded-xl border border-white/5 text-center cursor-pointer hover:border-blue-500 text-xl font-black italic transition-all">${gk}</div>`;
                        }
                    });
                    html += `</div>`;
                }

                // FAZA 2 - PRELIMINARII
                if(currentSezonData?.f2) {
                    html += `<h2 class="text-xl font-black italic uppercase mb-4 text-blue-500 border-t border-slate-800 pt-8">Preliminarii</h2>
                             <div class="grid grid-cols-4 gap-2 mb-10">`;
                    Object.keys(currentSezonData.f2).sort().forEach(gk => {
                        const inSearch = currentSezonData.f2[gk].participanti.some(p => p.toLowerCase().includes(state.search));
                        if(state.search === "" || inSearch) {
                            html += `<div onclick="nav('grupa', 'f2', '${gk}')" class="bg-blue-900/20 p-4 rounded-xl border border-blue-500/30 text-center cursor-pointer hover:border-blue-500 text-xl font-black italic transition-all">${gk}</div>`;
                        }
                    });
                    html += `</div>`;
                }

                if(currentSezonData?.f1) {
                    html += `<div class="mt-8 mb-10">
                        <img src="https://i.ibb.co/d0W5L7h2/grupe.png" alt="Tablou Grupe" class="w-full h-auto rounded-3xl border border-white/5 shadow-2xl opacity-90">
                    </div>`;
                }
            } else if(state.pagina === "grupa") {
                const g = currentSezonData[state.faza][state.idGrupa], c = calculeazaClasament(g);
                html += `<button onclick="nav('home')" class="mb-4 text-xs font-bold text-blue-500 uppercase">← Înapoi</button>
                         <div class="text-3xl font-black mb-8 uppercase italic text-center text-blue-500">Grupa ${state.idGrupa} <span class="text-xs block text-slate-600">${state.faza === 'f1' ? 'Faza Grupelor' : 'Preliminarii'}</span></div>
                         <div class="bg-slate-900 p-4 rounded-3xl mb-10 border border-slate-800 overflow-hidden"><table class="w-full text-xs font-bold">
                            <tr class="text-slate-500 uppercase"><th class="text-left pb-2 pl-2">Jucător</th><th>V</th><th>C</th><th>P</th></tr>
                            ${c.map((x,i) => `<tr class="border-t border-white/5 ${i < 2 ? 'text-green-500' : ''}">
                                <td class="py-3 pl-2">${drawUser(x.nume)}</td><td class="text-center font-black">${x.v}</td><td class="text-center">${x.c}</td><td class="text-center">${x.p}</td>
                            </tr>`).join('')}</table></div>`;
                g.participanti.forEach(j => {
                    html += `<div class="mb-10"><div class="flex items-center gap-4 mb-5 ml-1 p-2 border-l-4 border-blue-500 bg-slate-900/30 rounded-r-xl">${drawUser(j, "w-14 h-14", "text-xl font-black")}</div>`;
                    g.meciuri.filter(m => m.p1 === j || m.p2 === j).forEach(m => {
                        const adv = m.p1 === j ? m.p2 : m.p1, sT = m.p1 === j ? `${m.s1t}-${m.s2t}` : `${m.s2t}-${m.s1t}`, sR = m.p1 === j ? `${m.s1r}-${m.s2r}` : `${m.s2r}-${m.s1r}`;
                        html += `<div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5 mb-3 flex justify-between items-center">
                            <div class="flex items-center gap-3">${drawUser(adv, "w-8 h-8", "text-blue-400 font-bold")}</div>
                            <div class="flex gap-2">
                                <button onclick="updateScorMeci('${m.id}','t','${m.p1}','${m.p2}','${j}')" class="bg-black px-3 py-2 rounded-lg border border-slate-800 text-[10px] font-black uppercase">T: ${sT}</button>
                                <button onclick="updateScorMeci('${m.id}','r','${m.p1}','${m.p2}','${j}')" class="bg-black px-3 py-2 rounded-lg border border-slate-800 text-[10px] font-black uppercase">R: ${sR}</button>
                            </div></div>`;
                    });
                    html += `</div>`;
                });
            }
            root.innerHTML = html + `</div><footer class="mt-20 py-10 border-t border-slate-900 text-center"><p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-600">&copy; 2026. Creat de <a href="https://www.facebook.com/isshmenn" target="_blank" class="text-blue-500">Vali Dragomir</a></p></footer>`;
        }

        onAuthStateChanged(auth, u => { userLogat = u; render(); });
        onSnapshot(doc(db, "sezoane", SEZON_ID), s => { if(s.exists()) { currentSezonData = s.data(); render(); } });
        onSnapshot(collection(db, "jucatori"), s => { s.forEach(d => dateJucatori[d.id] = d.data()); render(); });
    </script>
</head>
<body class="bg-black font-sans tracking-tight"><div id="app"></div></body>
</html>
